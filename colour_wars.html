<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Colour Wars</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Light Theme (Default) */
        :root {
            --bg-color: #e0e5ec;
            --text-color: #111;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --panel-border: rgba(0, 0, 0, 0.1);
            --arena-color: #ffffff;
            --timer-color: #333;
            --p1-color: #00ffff; /* Neon Cyan */
            --p2-color: #ff00ff; /* Neon Magenta */
        }
        
        /* Dark Theme */
        body.dark-mode {
            --bg-color: #0f0f1a;
            --text-color: #ffffff;
            --panel-bg: rgba(15, 15, 26, 0.9);
            --panel-border: rgba(255, 255, 255, 0.1);
            --arena-color: #1a1a24; /* Dark gray */
            --timer-color: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none;
            transition: background-color 0.3s;
        }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            z-index: 10;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            padding: 15px 40px;
            border-radius: 20px;
            border: 1px solid var(--panel-border);
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        
        body.dark-mode .header { box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .score-box {
            font-size: 24px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
            -webkit-text-stroke: 1px #000;
        }
        
        #p1-score { color: var(--p1-color); text-shadow: 0 0 15px var(--p1-color); -webkit-text-stroke: 1.5px #000; }
        #p2-score { color: var(--p2-color); text-shadow: 0 0 15px var(--p2-color); -webkit-text-stroke: 1.5px #000; }
        
        #timer {
            font-size: 36px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 2px;
            color: var(--timer-color);
            text-shadow: 0 0 10px rgba(0,0,0,0.2);
            -webkit-text-stroke: 1.5px #000;
        }
        body.dark-mode #timer { text-shadow: 0 0 10px rgba(255,255,255,0.5); color: #fff; }
        
        #game-container {
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid var(--panel-border);
            background: var(--arena-color);
            transition: background-color 0.3s;
        }
        body.dark-mode #game-container { box-shadow: 0 0 60px rgba(0,0,0,0.6); }
        
        canvas { display: block; }
        
        .menu-screen {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            pointer-events: auto;
            border: 1px solid var(--panel-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 20;
            width: 90%;
            max-width: 500px;
            transition: opacity 0.3s, transform 0.3s;
        }
        body.dark-mode .menu-screen { box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        
        .menu-screen.hidden { 
            opacity: 0; 
            pointer-events: none; 
            transform: translate(-50%, -45%);
            display: none; 
        }
        .menu-screen.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%);
        }
        
        h1 { 
            font-size: 52px; 
            margin-bottom: 30px; 
            background: -webkit-linear-gradient(45deg, var(--p1-color), var(--p2-color)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            line-height: 1.2;
        }
        
        h2 { margin-bottom: 25px; font-size: 32px; }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        button {
            background: linear-gradient(135deg, var(--p1-color), #0055ff);
            color: white; 
            border: none; 
            padding: 16px 45px; 
            font-size: 20px; 
            font-weight: 900; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }
        
        button.secondary {
            background: transparent;
            border: 2px solid var(--text-color);
            color: var(--text-color);
            box-shadow: none;
        }
        
        button:hover {
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 15px 30px rgba(0, 255, 255, 0.5);
        }
        button.secondary:hover {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        button:active { transform: translateY(2px); }
        
        .control-group {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: left;
        }
        body.dark-mode .control-group { background: rgba(255,255,255,0.05); }
        
        .control-group label { font-size: 16px; font-weight: bold; }
        
        select, input[type="number"] {
            width: 120px; 
            padding: 10px; 
            border-radius: 8px; 
            border: 2px solid var(--panel-border); 
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 16px; 
            font-weight: bold; 
            outline: none;
        }
        
        /* Joystick for Mobile */
        #joystick-zone {
            position: absolute; 
            bottom: 40px; 
            left: 40px; 
            width: 160px; 
            height: 160px;
            border-radius: 50%; 
            background: rgba(100,100,100,0.1);
            border: 2px solid rgba(100,100,100,0.3);
            pointer-events: auto; 
            display: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }
        body.dark-mode #joystick-zone { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        
        #joystick-knob {
            position: absolute; 
            top: 55px; 
            left: 55px; 
            width: 50px; 
            height: 50px;
            border-radius: 50%; 
            background: rgba(0,0,0,0.4);
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        body.dark-mode #joystick-knob { background: rgba(255,255,255,0.8); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        @media (max-width: 768px) {
            .header { 
                padding: 15px; flex-direction: column; gap: 10px; 
                border-radius: 0 0 20px 20px; top: 0; position: absolute; width: 100%; border-top: none; 
            }
            .score-box { font-size: 5vw; }
            #timer { font-size: 8vw; }
            #game-container { border: none; border-radius: 0; width: 100%; height: 100vh; }
            canvas { width: 100% !important; height: 100% !important; }
        }
    </style>
</head>
<body class="dark-mode">
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="ui-layer" style="display: none;">
        <div class="header">
            <div class="score-box"><span style="color: var(--p1-color);">■</span> You: <span id="p1-score">0</span>%</div>
            <div id="timer">60.0</div>
            <div class="score-box"><span id="p2-score">0</span>% :AI <span style="color: var(--p2-color);">■</span></div>
        </div>
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
    </div>

    <!-- Title Screen -->
    <div id="screen-title" class="menu-screen active">
        <h1>Colour Wars</h1>
        <div class="btn-group">
            <button onclick="nav('screen-mode-select')">Play</button>
            <button class="secondary" onclick="nav('screen-settings')">Settings</button>
        </div>
    </div>

    <!-- Mode Select -->
    <div id="screen-mode-select" class="menu-screen hidden">
        <h2>Select Mode</h2>
        <div class="btn-group">
            <button onclick="nav('screen-classic-setup')">Classic (vs AI)</button>
            <button class="secondary" onclick="nav('screen-title')">Back</button>
        </div>
    </div>

    <!-- Classic Setup -->
    <div id="screen-classic-setup" class="menu-screen hidden">
        <h2>Classic Match</h2>
        <div class="control-group">
            <label>Time Limit (sec):</label>
            <input type="number" id="time-input" value="60" min="10" max="300">
        </div>
        <div class="btn-group">
            <button onclick="initGame()">Start Battle</button>
            <button class="secondary" onclick="nav('screen-mode-select')">Back</button>
        </div>
    </div>

    <!-- Settings -->
    <div id="screen-settings" class="menu-screen hidden">
        <h2>Settings</h2>
        <div class="control-group">
            <label>Theme:</label>
            <select id="setting-theme" onchange="applySettings()">
                <option value="dark">Dark Mode</option>
                <option value="light">Light Mode</option>
            </select>
        </div>
        <div class="control-group">
            <label>Controls:</label>
            <select id="setting-controls" onchange="applySettings()">
                <option value="auto">Auto-Detect</option>
                <option value="pc">Force PC (Keyboard)</option>
                <option value="mobile">Force Mobile (Joystick)</option>
            </select>
        </div>
        <div class="btn-group" style="margin-top: 20px;">
            <button class="secondary" onclick="nav('screen-title')">Back</button>
        </div>
    </div>

    <!-- Game Over -->
    <div id="screen-game-over" class="menu-screen hidden">
        <h1 id="winner-text">Game Over</h1>
        <div style="margin-bottom: 30px; font-size: 24px; background: rgba(128,128,128,0.2); padding: 20px; border-radius: 12px; font-weight: bold; -webkit-text-stroke: 1px #000;">
            <div style="margin-bottom: 10px; color: var(--p1-color); text-shadow: 0 0 10px var(--p1-color);">You: <span id="final-p1">0</span>%</div>
            <div style="color: var(--p2-color); text-shadow: 0 0 10px var(--p2-color);">AI: <span id="final-p2">0</span>%</div>
        </div>
        <div class="btn-group">
            <button onclick="initGame()">Play Again</button>
            <button class="secondary" onclick="endToMenu()">Main Menu</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('ui-layer');
        const joyZone = document.getElementById('joystick-zone');
        const joyKnob = document.getElementById('joystick-knob');
        
        let GAME_WIDTH = 900;
        let GAME_HEIGHT = 700;
        
        function applySettings() {
            const theme = document.getElementById('setting-theme').value;
            if(theme === 'dark') document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
            
            updateJoystickVisibility();
            if(!gameRunning && typeof render === 'function') render();
        }
        
        function updateJoystickVisibility() {
            const controls = document.getElementById('setting-controls').value;
            if (controls === 'force-mobile' || controls === 'mobile') {
                joyZone.style.display = 'block';
            } else if (controls === 'force-pc' || controls === 'pc') {
                joyZone.style.display = 'none';
            } else {
                joyZone.style.display = window.innerWidth < 768 ? 'block' : 'none';
            }
        }
        
        function resizeCanvas() {
            if (window.innerWidth < 768) {
                GAME_WIDTH = window.innerWidth;
                GAME_HEIGHT = window.innerHeight;
            } else {
                GAME_WIDTH = 900;
                GAME_HEIGHT = 700;
            }
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
            updateJoystickVisibility();
            if(!gameRunning && typeof render === 'function') render();
        }
        
        window.addEventListener('resize', resizeCanvas);

        // Navigation
        function nav(screenId) {
            document.querySelectorAll('.menu-screen').forEach(s => {
                s.classList.remove('active');
                s.classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
            document.getElementById(screenId).classList.add('active');
        }

        const CELL_SIZE = 15;
        let COLS, ROWS;
        let grid = []; 
        let p1 = { x: 0, y: 0, vx: 0, vy: 0, speed: 350, radius: 15 };
        let p2 = { x: 0, y: 0, vx: 0, vy: 0, speed: 310, radius: 15, targetX: 0, targetY: 0 };
        let timeRemaining = 60;
        let gameRunning = false;
        let lastTime = 0;
        let keys = {};
        
        let touchActive = false;
        let joyRect = null;
        let joystickVector = {x: 0, y: 0};

        const p1ScoreEl = document.getElementById('p1-score');
        const p2ScoreEl = document.getElementById('p2-score');
        const timerEl = document.getElementById('timer');
        const winnerText = document.getElementById('winner-text');
        const timeInput = document.getElementById('time-input');

        function initGrid() {
            COLS = Math.ceil(GAME_WIDTH / CELL_SIZE);
            ROWS = Math.ceil(GAME_HEIGHT / CELL_SIZE);
            grid = new Array(COLS * ROWS).fill(0);
        }

        function initGame() {
            initGrid();
            p1.x = GAME_WIDTH * 0.25;
            p1.y = GAME_HEIGHT / 2;
            p2.x = GAME_WIDTH * 0.75;
            p2.y = GAME_HEIGHT / 2;
            p2.targetX = p2.x; p2.targetY = p2.y;
            
            timeRemaining = parseFloat(timeInput.value) || 60;
            gameRunning = true;
            lastTime = performance.now();
            
            document.querySelectorAll('.menu-screen').forEach(s => {
                s.classList.remove('active');
                s.classList.add('hidden');
            });
            uiLayer.style.display = 'block';
            
            requestAnimationFrame(gameLoop);
        }
        
        function endToMenu() {
            uiLayer.style.display = 'none';
            nav('screen-title');
            initGrid();
            render();
        }

        function getCellIndex(x, y) {
            let col = Math.floor(x / CELL_SIZE);
            let row = Math.floor(y / CELL_SIZE);
            if(col < 0 || col >= COLS || row < 0 || row >= ROWS) return -1;
            return row * COLS + col;
        }

        function colorArea(px, py, radius, ownerId) {
            let startCol = Math.max(0, Math.floor((px - radius) / CELL_SIZE));
            let endCol = Math.min(COLS - 1, Math.floor((px + radius) / CELL_SIZE));
            let startRow = Math.max(0, Math.floor((py - radius) / CELL_SIZE));
            let endRow = Math.min(ROWS - 1, Math.floor((py + radius) / CELL_SIZE));

            for (let r = startRow; r <= endRow; r++) {
                for (let c = startCol; c <= endCol; c++) {
                    let cellCX = c * CELL_SIZE + CELL_SIZE/2;
                    let cellCY = r * CELL_SIZE + CELL_SIZE/2;
                    let distSq = (cellCX - px)**2 + (cellCY - py)**2;
                    if (distSq <= (radius + CELL_SIZE/2)**2) {
                        grid[r * COLS + c] = ownerId;
                    }
                }
            }
        }

        function updateAI(dt) {
            if (Math.random() < 0.1 || Math.hypot(p2.x - p2.targetX, p2.y - p2.targetY) < 30) {
                let attempts = 0;
                while (attempts < 15) {
                    let angle = Math.random() * Math.PI * 2;
                    let dist = Math.random() * 300 + 50;
                    let rX = p2.x + Math.cos(angle) * dist;
                    let rY = p2.y + Math.sin(angle) * dist;
                    
                    rX = Math.max(0, Math.min(GAME_WIDTH, rX));
                    rY = Math.max(0, Math.min(GAME_HEIGHT, rY));

                    let idx = getCellIndex(rX, rY);
                    if (idx !== -1 && grid[idx] !== 2) {
                        p2.targetX = rX;
                        p2.targetY = rY;
                        break;
                    }
                    attempts++;
                }
            }

            let dx = p2.targetX - p2.x;
            let dy = p2.targetY - p2.y;
            let dist = Math.hypot(dx, dy);
            if (dist > 0) {
                p2.vx = (dx / dist);
                p2.vy = (dy / dist);
            }

            p2.x += p2.vx * p2.speed * dt;
            p2.y += p2.vy * p2.speed * dt;

            p2.x = Math.max(p2.radius, Math.min(GAME_WIDTH - p2.radius, p2.x));
            p2.y = Math.max(p2.radius, Math.min(GAME_HEIGHT - p2.radius, p2.y));
        }

        function updatePlayer(dt) {
            let vx = 0; let vy = 0;
            
            if (touchActive) {
                vx = joystickVector.x;
                vy = joystickVector.y;
            } else {
                if (keys['ArrowUp'] || keys['w']) vy -= 1;
                if (keys['ArrowDown'] || keys['s']) vy += 1;
                if (keys['ArrowLeft'] || keys['a']) vx -= 1;
                if (keys['ArrowRight'] || keys['d']) vx += 1;
                
                let len = Math.hypot(vx, vy);
                if(len > 0) { vx /= len; vy /= len; }
            }

            p1.x += vx * p1.speed * dt;
            p1.y += vy * p1.speed * dt;

            p1.x = Math.max(p1.radius, Math.min(GAME_WIDTH - p1.radius, p1.x));
            p1.y = Math.max(p1.radius, Math.min(GAME_HEIGHT - p1.radius, p1.y));
        }

        function updateScores() {
            let p1Count = 0; let p2Count = 0;
            let total = COLS * ROWS;
            for(let i=0; i<total; i++){
                if(grid[i] === 1) p1Count++;
                else if(grid[i] === 2) p2Count++;
            }
            p1ScoreEl.innerText = ((p1Count / total) * 100).toFixed(1);
            p2ScoreEl.innerText = ((p2Count / total) * 100).toFixed(1);
            return {p1Count, p2Count, total};
        }

        function render() {
            const rootStyle = getComputedStyle(document.body);
            ctx.fillStyle = rootStyle.getPropertyValue('--arena-color').trim() || '#ffffff';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            const p1Color = rootStyle.getPropertyValue('--p1-color').trim() || '#00ffff';
            const p2Color = rootStyle.getPropertyValue('--p2-color').trim() || '#ff00ff';

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let val = grid[r * COLS + c];
                    if (val !== 0) {
                        ctx.fillStyle = val === 1 ? p1Color : p2Color;
                        ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE + 1, CELL_SIZE + 1); 
                    }
                }
            }

            ctx.shadowBlur = 25;
            
            ctx.shadowColor = p2Color;
            ctx.fillStyle = p2Color;
            ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.radius * 0.5, 0, Math.PI*2); ctx.fill();
            
            ctx.shadowColor = p1Color;
            ctx.fillStyle = p1Color;
            ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.radius * 0.5, 0, Math.PI*2); ctx.fill();
            
            ctx.shadowBlur = 0;
        }

        function endGame() {
            gameRunning = false;
            uiLayer.style.display = 'none';
            let scores = updateScores();
            let p1Pct = ((scores.p1Count / scores.total) * 100).toFixed(1);
            let p2Pct = ((scores.p2Count / scores.total) * 100).toFixed(1);
            
            document.getElementById('final-p1').innerText = p1Pct;
            document.getElementById('final-p2').innerText = p2Pct;
            
            const rootStyle = getComputedStyle(document.body);
            const p1Color = rootStyle.getPropertyValue('--p1-color').trim();
            const p2Color = rootStyle.getPropertyValue('--p2-color').trim();
            
            if (scores.p1Count > scores.p2Count) {
                winnerText.innerText = "You Won!";
                winnerText.style.background = `-webkit-linear-gradient(45deg, #fff, ${p1Color})`;
            } else if (scores.p2Count > scores.p1Count) {
                winnerText.innerText = "AI Won!";
                winnerText.style.background = `-webkit-linear-gradient(45deg, #fff, ${p2Color})`;
            } else {
                winnerText.innerText = "It's a Draw!";
                winnerText.style.background = `-webkit-linear-gradient(45deg, ${p1Color}, ${p2Color})`;
            }
            winnerText.style.webkitBackgroundClip = 'text';
            winnerText.style.webkitTextFillColor = 'transparent';
            
            nav('screen-game-over');
        }

        function gameLoop(time) {
            if (!gameRunning) return;
            let dt = (time - lastTime) / 1000;
            lastTime = time;
            
            if (dt > 0.1) dt = 0.1;

            updatePlayer(dt);
            updateAI(dt);
            
            colorArea(p1.x, p1.y, p1.radius * 1.8, 1);
            colorArea(p2.x, p2.y, p2.radius * 1.8, 2);

            timeRemaining -= dt;
            if (timeRemaining <= 0) {
                timeRemaining = 0;
                timerEl.innerText = "0.0";
                render();
                updateScores();
                endGame();
                return;
            }
            
            timerEl.innerText = timeRemaining.toFixed(1);
            
            render();
            if (Math.floor(time) % 4 === 0) updateScores();

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        joyZone.addEventListener('touchstart', e => {
            e.preventDefault();
            touchActive = true;
            joyRect = joyZone.getBoundingClientRect();
            updateJoystick(e.touches[0]);
        }, {passive: false});

        joyZone.addEventListener('touchmove', e => {
            e.preventDefault();
            if(touchActive) updateJoystick(e.touches[0]);
        }, {passive: false});

        joyZone.addEventListener('touchend', e => {
            e.preventDefault();
            touchActive = false;
            joyKnob.style.transform = `translate(0px, 0px)`;
            joystickVector = {x: 0, y: 0};
        }, {passive: false});

        function updateJoystick(touch) {
            let dx = touch.clientX - joyRect.left - 80; 
            let dy = touch.clientY - joyRect.top - 80;
            let dist = Math.hypot(dx, dy);
            let maxDist = 45; 
            
            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }
            
            joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            joystickVector.x = dx / maxDist;
            joystickVector.y = dy / maxDist;
        }

        // Setup init screen
        resizeCanvas();
        applySettings();
        initGrid();
        render();

    </script>
</body>
</html>
